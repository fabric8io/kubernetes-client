name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'ide-config/**'
      - '**.md'
  schedule:
    - cron: '0 1 * * *' # Every day at 1

concurrency:
  # Only run once for latest commit per ref and cancel other (previous) runs.
  group: ci-e2e-kubernetes-client-${{ github.ref }}
  cancel-in-progress: true

env:
  IT_REVISION: master
  IT_MODULE: kubernetes-itests,kubernetes-itests-envtest
  MAVEN_ARGS: -B -C -V -ntp -Dhttp.keepAlive=false -e

jobs:
  buildWithoutTests:
    name: BuildWithoutTests
    runs-on: ubuntu-24.04-arm
    if: github.repository == 'fabric8io/kubernetes-client'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache .m2 registry
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: cache-e2e-${{ github.sha }}-${{ github.run_id }}
      - name: Setup Java 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Install Kubernetes Client
        run: make quickly MAVEN_ARGS="${MAVEN_ARGS}"

  minikube_baremetal:
    name: Baremetal K8S
    needs: buildWithoutTests
    runs-on: ubuntu-24.04-arm
    if: github.repository == 'fabric8io/kubernetes-client'
    strategy:
      fail-fast: false
      matrix:
        kubernetes: [v1.36.0,v1.35.4,v1.34.7,v1.33.11,v1.32.13,v1.31.14,v1.30.14,v1.29.15]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Minikube-Kubernetes
        uses: manusa/actions-setup-minikube@v2.17.0
        with:
          minikube version: v1.38.1
          kubernetes version: ${{ matrix.kubernetes }}
          github token: ${{ secrets.GITHUB_TOKEN }}
          start args: '--force'
      - name: Cache .m2 registry
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: cache-e2e-${{ github.sha }}-${{ github.run_id }}
      - name: Setup Java 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Install and Run Integration Tests
        run: |
          ./mvnw ${MAVEN_ARGS} -Pitests -pl $IT_MODULE test -Dtest="io.fabric8.kubernetes.**"
