# A benign string enum whose values contain backslashes (Windows-style paths). The backslash must
# be escaped when emitted, not treated as a broken Java escape sequence that aborts generation.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: registrykeys.example.com
spec:
  group: example.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                regKey:
                  type: string
                  enum:
                    - 'HKEY\Software'
                    - 'HKEY\System'
  scope: Namespaced
  names:
    plural: registrykeys
    singular: registrykey
    kind: RegistryKey
